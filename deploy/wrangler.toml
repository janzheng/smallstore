name = "smallstore"
main = "src/index.ts"
compatibility_date = "2026-04-21"
compatibility_flags = ["nodejs_compat"]

account_id = "cceae190abc777c64fb8d7a98be577a3"

# ============================================================================
# Vars — plain config, not secrets
# ============================================================================

[vars]
# Comma-separated addresses the user forwards from. The forward-detection
# hook checks incoming from_email against this list to tag mail as
# `forwarded` + `manual` and extract original_from_* from the body.
# Whitelisted "trusted forwarders" (friends who curate mail for me) are
# included here so their forwards also trigger detection.
SELF_ADDRESSES = "hello@janzheng.com,jan@phage.directory,janeazy@gmail.com,jessica.c.sacher@gmail.com"

# Sender-name aliases — `pattern:name,pattern:name`. Each pattern is a glob
# (`*` wildcard) matched case-insensitively against the sender address
# (`original_from_email` on forwards, `from_email` otherwise). First match
# wins. The hook writes `fields.sender_name` + a `sender:<slug>` label, so
# `labels: ['sender:jessica']` queries collapse all of a person's address
# variants under one handle. Unset → hook disabled.
SENDER_ALIASES = "jessica.c.sacher@*:Jessica,jan@phage.directory:Jan,janzheng@*:Jan,janeazy@*:Jan,hello@janzheng.com:Jan"

# Sender-address globs that opt into auto-confirming double-opt-in links.
# When a `needs-confirm` item's from_email matches one of these patterns,
# the worker GETs the extracted confirm_url at ingest and swaps the label
# for `auto-confirmed`. Non-allowlisted senders still land in the
# `needs-confirm` queue for manual click via POST /inbox/:name/confirm/:id.
# Safety: only HTTPS + named-domain hosts auto-follow; unsubscribe URLs
# are rejected even if the sender is allowlisted.
AUTO_CONFIRM_SENDERS = "*@substack.com,*@substackmail.com,*@convertkit.com,*@beehiiv.com,*@mailerlite.com,*@emailoctopus.com,*@uxdesign.cc,*@every.to"

# Worker owns smallstore.labspace.ai. The DNS record must exist in the
# labspace.ai zone (orange-cloud / Proxied) before the first deploy — its
# CNAME target is a fallback only; when the Worker is active, requests are
# handled here.
routes = [
  { pattern = "smallstore.labspace.ai/*", zone_name = "labspace.ai" }
]

# ============================================================================
# Bindings — fill in after creating the resources via `wrangler d1 create`
# and `wrangler r2 bucket create`. See deploy/README.md for the recipe.
# ============================================================================

# D1 database for the mailroom inbox's structured rows (InboxItem JSON, _index).
# Smallstore's cloudflare-d1 adapter is `kv_store`-shaped — one table per
# adapter — so the schema is created on first write.
[[d1_databases]]
binding = "MAILROOM_D1"
database_name = "mailroom"
database_id = "b4d71d61-a96f-4f27-9d06-c08215cd1ccc"

# R2 bucket for the mailroom inbox's blobs (raw .eml, html bodies, attachments).
[[r2_buckets]]
binding = "MAILROOM_R2"
bucket_name = "mailroom"

# ============================================================================
# Secrets (set via `wrangler secret put`, NOT committed here)
# ============================================================================
#
#   wrangler secret put SMALLSTORE_TOKEN
#
# When set, all /api, /inbox, /admin routes require:
#   Authorization: Bearer <SMALLSTORE_TOKEN>
# Unset → routes are open (NOT recommended for the deployed Worker).

# ============================================================================
# Cron triggers — RSS pull-runner
# ============================================================================
#
# Fires the Worker's `scheduled()` handler which iterates every peer
# registered with `type: 'rss'`, fetches the feed, and dispatches parsed
# items into the target inbox named in `metadata.feed_config.target_inbox`.
# See `src/messaging/pull-runner.ts`.
#
# Every 30 minutes — a middle ground between "most publishers hate being
# polled more than hourly" and "I want to see biorxiv preprints promptly".
# Adjust per-feed rate limiting when we have it; for now this is the whole
# fleet's cadence.

[triggers]
crons = ["*/30 * * * *"]

[observability]
enabled = true
